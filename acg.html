<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>acg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .fullscreen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            cursor: pointer;
        }

        .fullscreen img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div class="fullscreen" id="fullscreen">
        <img id="mainImage" alt="图片">
    </div>

    <script>
        const API_URL = 'https://loliapi.com/acg';
        const img = document.getElementById('mainImage');
        
        function loadImage() {
            const url = `${API_URL}?t=${Date.now()}`;
            img.src = url;
        }
    document.addEventListener('click', function() {
        loadImage();
    });
        loadImage();
    </script>
</body>
</html>
