name: Sync from Codeberg

on:
  workflow_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write  
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Pull from Codeberg
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote add codeberg https://codeberg.org/yumou/huh114514.github.io.git
          git fetch codeberg main
          git merge codeberg/main --allow-unrelated-histories --no-edit || true
          
          if ! git diff --cached --quiet; then
            git checkout --theirs .
            git add .
            git commit -m "Auto-resolve: prefer Codeberg"
          fi
      
      - name: Push to GitHub
        run: |
          git pull origin main --rebase || true
          git push origin main